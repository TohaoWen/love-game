<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>数据面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#f0f0f0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
font-family:system-ui;
user-select:none;
}
#canvas{
border:1px solid #ccc;
background:#fff;
border-radius:4px;
}
#score{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:18px;
color:#555;
}
</style>
</head>
<body>
<div id="score">0</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

const W = Math.min(window.innerWidth - 20, 350);
const H = 600;
canvas.width = W;
canvas.height = H;

const laneWidth = W / 3;
let playerLane = 1;
let playerY = H - 80;
let playerSize = 40;

let speed = 6;
let obstacles = [];
let score = 0;
let gameOver = false;
let frame = 0;

function drawPlayer(){
ctx.fillStyle = '#444';
ctx.fillRect(
laneWidth * playerLane + laneWidth/2 - playerSize/2,
playerY,
playerSize,
playerSize
);
}

function spawnObstacle(){
obstacles.push({
lane: Math.floor(Math.random()*3),
y: -50
});
}

function updateObstacles(){
obstacles.forEach(o => o.y += speed);
obstacles = obstacles.filter(o => o.y < H);
if(frame % 50 === 0){
spawnObstacle();
speed += 0.02;
}
}

function drawObstacles(){
ctx.fillStyle = '#888';
obstacles.forEach(o => {
ctx.fillRect(
laneWidth * o.lane + laneWidth/2 - 25,
o.y,
50,
50
);
});
}

function checkCollision(){
for(let o of obstacles){
if(
o.y + 50 > playerY &&
o.y < playerY + playerSize &&
o.lane === playerLane
){
gameOver = true;
}
}
}

function drawRoad(){
ctx.strokeStyle = '#ddd';
ctx.lineWidth = 2;
for(let i=1;i<3;i++){
ctx.beginPath();
ctx.moveTo(laneWidth*i, 0);
ctx.lineTo(laneWidth*i, H);
ctx.stroke();
}
}

function gameLoop(){
if(gameOver){
alert('结束 得分：'+score+'\n点击重开');
window.location.reload();
return;
}
ctx.clearRect(0,0,W,H);
drawRoad();
updateObstacles();
drawObstacles();
drawPlayer();
checkCollision();
frame++;
if(frame%10 === 0) score++;
scoreEl.textContent = score;
requestAnimationFrame(gameLoop);
}

// 左右滑动 / 点击控制
let touchStartX = 0;
canvas.addEventListener('touchstart', e=>{
touchStartX = e.touches[0].clientX;
});
canvas.addEventListener('touchend', e=>{
const dx = e.changedTouches[0].clientX - touchStartX;
if(dx < -30 && playerLane > 0) playerLane--;
if(dx > 30 && playerLane < 2) playerLane++;
});

// 电脑端左右键
window.addEventListener('keydown', e=>{
if(e.key === 'ArrowLeft' && playerLane > 0) playerLane--;
if(e.key === 'ArrowRight' && playerLane < 2) playerLane++;
});

gameLoop();
</script>
</body>
</html>
