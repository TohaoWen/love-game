<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工作面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f1f1f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            user-select: none;
            touch-action: none;
            color: #333;
        }
        #score {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 10px;
            color: #555;
        }
        #canvas {
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 4px;
        }
        #tip {
            margin-top: 10px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <div id="score">分数：0</div>
    <canvas id="canvas"></canvas>
    <div id="tip">点击/触摸屏幕控制方块</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        // 尺寸适配手机
        const W = Math.min(window.innerWidth - 20, 320);
        const H = 500;
        canvas.width = W;
        canvas.height = H;

        // 游戏参数（非常低调、朴素）
        const player = {
            x: 80,
            y: H / 2,
            w: 20,
            h: 20,
            vy: 0,
            gravity: 0.4,
            jump: -8
        };

        const pipeWidth = 30;
        const pipeSpeed = 3;
        const gap = 140;
        let pipes = [];
        let score = 0;
        let frame = 0;
        let running = false;

        function drawPlayer() {
            ctx.fillStyle = '#444';
            ctx.fillRect(player.x, player.y, player.w, player.h);
        }

        function updatePlayer() {
            player.vy += player.gravity;
            player.y += player.vy;
            // 撞上下边界即结束
            if (player.y < 0 || player.y + player.h > H) {
                gameOver();
            }
        }

        function jump() {
            if (!running) {
                start();
            }
            player.vy = player.jump;
        }

        function spawnPipe() {
            const topH = 80 + Math.random() * (H - gap - 160);
            pipes.push({
                x: W,
                topH,
                botY: topH + gap,
                scored: false
            });
        }

        function updatePipes() {
            pipes.forEach(p => p.x -= pipeSpeed);
            pipes = pipes.filter(p => p.x + pipeWidth > 0);
            if (frame % 90 === 0) spawnPipe();
        }

        function drawPipes() {
            ctx.fillStyle = '#999';
            pipes.forEach(p => {
                ctx.fillRect(p.x, 0, pipeWidth, p.topH);
                ctx.fillRect(p.x, p.botY, pipeWidth, H - p.botY);
            });
        }

        function hitTest() {
            const px = player.x;
            const py = player.y;
            const pw = player.w;
            const ph = player.h;
            for (const p of pipes) {
                if (px + pw > p.x && px < p.x + pipeWidth) {
                    if (py < p.topH || py + ph > p.botY) {
                        gameOver();
                    }
                }
                if (!p.scored && p.x + pipeWidth < px) {
                    score++;
                    p.scored = true;
                    scoreEl.textContent = `分数：${score}`;
                }
            }
        }

        function loop() {
            if (!running) return;
            ctx.clearRect(0, 0, W, H);
            updatePlayer();
            updatePipes();
            drawPipes();
            drawPlayer();
            hitTest();
            frame++;
            requestAnimationFrame(loop);
        }

        function start() {
            running = true;
            player.y = H / 2;
            player.vy = 0;
            pipes = [];
            score = 0;
            frame = 0;
            scoreEl.textContent = `分数：${score}`;
            loop();
        }

        function gameOver() {
            running = false;
            setTimeout(() => {
                alert(`游戏结束\n得分：${score}\n点击屏幕重新开始`);
            }, 100);
        }

        // 点击/触摸控制
        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            jump();
        });
    </script>
</body>
</html>
