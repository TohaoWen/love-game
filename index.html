<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>❤️ 跳跃的爱心 ❤️</title>
    <style>
        body {
            margin: 0; padding: 0;
            overflow: hidden;
            background-color: #fce4ec;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            user-select: none;
            touch-action: none;
        }

        #gameCanvas {
            border: 5px solid #ff80ab;
            border-radius: 10px;
            background-color: #fff0f5;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            touch-action: none;
        }

        #score-board {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: #ff3366;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        #level-info {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            color: #4b0082;
            font-weight: bold;
            z-index: 10;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            background: rgba(255, 255, 255, 0.8);
        }
        
        .message-box {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.8);
            border: 4px solid #ff69b4;
            max-width: 320px;
        }
        
        h1 { color: #ff3366; margin-bottom: 15px; font-size: 28px; }
        p { color: #666; font-size: 16px; line-height: 1.5; }

        .difficulty-list {
            margin: 20px 0;
        }

        .diff-btn {
            background: linear-gradient(45deg, #ff6b81, #ff4757);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 50px;
            margin: 6px;
            cursor: pointer;
        }

        .btn {
            background: linear-gradient(45deg, #ff6b81, #ff4757);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 50px;
            margin-top: 10px;
            cursor: pointer;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="score-board">0</div>
    <div id="level-info">关卡：1 简单 | 目标：10分</div>
    <canvas id="gameCanvas"></canvas>

    <div id="difficulty-overlay" class="overlay">
        <div class="message-box">
            <h1>❤️ 跳跃的爱心 ❤️</h1>
            <p>选择难度开始闯关</p>
            <div class="difficulty-list">
                <button class="diff-btn" onclick="selectLevel(1)">关卡1 简单</button>
                <button class="diff-btn" onclick="selectLevel(2)">关卡2 普通</button>
                <button class="diff-btn" onclick="selectLevel(3)">关卡3 困难</button>
                <button class="diff-btn" onclick="selectLevel(4)">关卡4 地狱</button>
            </div>
            <p>每关达到目标分即可解锁下一难度</p>
        </div>
    </div>

    <div id="gameover-overlay" class="overlay hidden">
        <div class="message-box">
            <h1>💔 挑战失败</h1>
            <p>你的分数：<span id="final-score">0</span></p>
            <p id="target-tip"></p>
            <p id="high-score-msg" style="color:#4b0082;"></p>
            <button class="btn" onclick="backToDifficulty()">返回选择</button>
            <button class="btn" onclick="restartCurrentLevel()">重试本关</button>
        </div>
    </div>

    <div id="pass-overlay" class="overlay hidden">
        <div class="message-box">
            <h1>🎉 恭喜通关！</h1>
            <p>当前分数：<span id="pass-score">0</span></p>
            <p id="next-level-tip"></p>
            <button class="btn" onclick="goNextLevel()">进入下一关卡</button>
            <button class="btn" onclick="backToDifficulty()">返回选择</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const CANVAS_WIDTH = Math.min(window.innerWidth * 0.9, 400);
        const CANVAS_HEIGHT = CANVAS_WIDTH * 1.5;
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;

        // 全局变慢：所有关卡重力都大幅降低，下落更慢
        const levelConfig = [
            {},
            { gravity: 0.22, jump: -11, speed: 2, gap: 180, spawn: 130, target: 10, name: "简单" },
            { gravity: 0.30, jump: -11, speed: 3, gap: 160, spawn: 110, target: 20, name: "普通" },
            { gravity: 0.38, jump: -11, speed: 4, gap: 140, spawn: 90,  target: 35, name: "困难" },
            { gravity: 0.45, jump: -11, speed: 5, gap: 120, spawn: 75,  target: 50, name: "地狱" }
        ];

        let currentLevel = 1;
        let playerY = CANVAS_HEIGHT / 2;
        let playerVelocity = 0;
        let pipes = [];
        let score = 0;
        let highScore = localStorage.getItem('heartHighScore') || 0;
        let isGameRunning = false;
        let frameCount = 0;

        const PLAYER_RADIUS = 22;
        const PLAYER_SAFE_MARGIN = 4;
        const PLAYER_X = CANVAS_WIDTH / 4 + 8;

        const scoreBoard = document.getElementById('score-board');
        const levelInfo = document.getElementById('level-info');
        const difficultyOverlay = document.getElementById('difficulty-overlay');
        const gameoverOverlay = document.getElementById('gameover-overlay');
        const passOverlay = document.getElementById('pass-overlay');

        function selectLevel(level) {
            currentLevel = level;
            startGame();
        }

        function startGame() {
            playerY = CANVAS_HEIGHT / 2;
            playerVelocity = 0;
            pipes = [];
            score = 0;
            frameCount = 0;
            isGameRunning = true;

            scoreBoard.textContent = 0;
            updateLevelInfo();

            difficultyOverlay.classList.add('hidden');
            gameoverOverlay.classList.add('hidden');
            passOverlay.classList.add('hidden');
            gameLoop();
        }

        function updateLevelInfo() {
            const cfg = levelConfig[currentLevel];
            levelInfo.textContent = `关卡${currentLevel} ${cfg.name} | 目标：${cfg.target}分`;
        }

        function gameLoop() {
            if (!isGameRunning) return;
            ctx.clearRect(0,0,CANVAS_WIDTH,CANVAS_HEIGHT);

            updatePlayer();
            updatePipes();
            drawPipes();
            drawPlayer();
            checkCollision();

            const cfg = levelConfig[currentLevel];
            if (score >= cfg.target) {
                passLevel();
                return;
            }

            frameCount++;
            requestAnimationFrame(gameLoop);
        }

        function drawPlayer() {
            ctx.fillStyle = '#ff3366';
            ctx.beginPath();
            ctx.arc(PLAYER_X, playerY, PLAYER_RADIUS, 0, Math.PI*2);
            ctx.fill();
        }

        function updatePlayer() {
            const cfg = levelConfig[currentLevel];
            playerVelocity += cfg.gravity;
            playerY += playerVelocity;

            if (playerY + PLAYER_RADIUS > CANVAS_HEIGHT || playerY - PLAYER_RADIUS < 0) {
                gameOver();
            }
        }

        function jump() {
            if (isGameRunning) {
                const cfg = levelConfig[currentLevel];
                playerVelocity = cfg.jump;
            }
        }

        function spawnPipe() {
            const cfg = levelConfig[currentLevel];
            const min = 50;
            const max = CANVAS_HEIGHT - cfg.gap - min;
            const h = Math.random()*(max-min)+min;

            pipes.push({
                x: CANVAS_WIDTH,
                topHeight: h,
                bottomY: h + cfg.gap,
                scored: false
            });
        }

        function updatePipes() {
            const cfg = levelConfig[currentLevel];
            pipes.forEach(p=> p.x -= cfg.speed);
            pipes = pipes.filter(p=> p.x > -50);
            if (frameCount % cfg.spawn === 0) spawnPipe();
        }

        function drawPipes() {
            ctx.fillStyle = '#4b0082';
            pipes.forEach(p=>{
                ctx.fillRect(p.x,0,50,p.topHeight);
                ctx.fillRect(p.x,p.bottomY,50,CANVAS_HEIGHT-p.bottomY);
            });
        }

        function checkCollision() {
            for (const p of pipes) {
                if (PLAYER_X + PLAYER_RADIUS - PLAYER_SAFE_MARGIN > p.x &&
                    PLAYER_X - PLAYER_RADIUS + PLAYER_SAFE_MARGIN < p.x + 50) {

                    const hitTop = playerY - PLAYER_RADIUS + PLAYER_SAFE_MARGIN < p.topHeight;
                    const hitBottom = playerY + PLAYER_RADIUS - PLAYER_SAFE_MARGIN > p.bottomY;

                    if (hitTop || hitBottom) {
                        gameOver();
                        return;
                    }

                    if (p.x + 50 < PLAYER_X && !p.scored) {
                        score++;
                        p.scored = true;
                        scoreBoard.textContent = score;
                    }
                }
            }
        }

        function gameOver() {
            isGameRunning = false;
            document.getElementById('final-score').textContent = score;
            const cfg = levelConfig[currentLevel];
            document.getElementById('target-tip').textContent = `本关目标：${cfg.target}分`;

            if (score>highScore) {
                highScore=score;
                localStorage.setItem('heartHighScore',highScore);
                document.getElementById('high-score-msg').textContent="新高分！";
            } else {
                document.getElementById('high-score-msg').textContent=`最高分：${highScore}`;
            }
            gameoverOverlay.classList.remove('hidden');
        }

        function passLevel() {
            isGameRunning = false;
            document.getElementById('pass-score').textContent = score;

            if (currentLevel >=4) {
                document.getElementById('next-level-tip').textContent="🎉 你已通关全部关卡！";
            } else {
                document.getElementById('next-level-tip').textContent=`即将解锁 关卡${currentLevel+1}`;
            }
            passOverlay.classList.remove('hidden');
        }

        function restartCurrentLevel() { startGame(); }
        function backToDifficulty() {
            gameoverOverlay.classList.add('hidden');
            passOverlay.classList.add('hidden');
            difficultyOverlay.classList.remove('hidden');
        }
        function goNextLevel() {
            if (currentLevel <4) { currentLevel++; startGame(); }
            else backToDifficulty();
        }

        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', e=>{e.preventDefault(); jump()});
    </script>
</body>
</html>
