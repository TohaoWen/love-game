<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>逻辑推演</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#f4f4f4;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
font-family:system-ui, sans-serif;
user-select:none;
color:#333;
}
#info{
margin-bottom:10px;
font-size:16px;
color:#555;
}
#game{
display:grid;
gap:2px;
background:#ccc;
padding:2px;
border-radius:4px;
}
.cell{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
background:#fff;
border-radius:2px;
}
.wall{ background:#666; }
.floor{ background:#fff; }
.target{ background:#d0e0ff; }
.box{ background:#ffb74d; }
.player{ background:#42a5f5; }
#reset{
margin-top:12px;
padding:8px 16px;
border:none;
background:#ddd;
border-radius:6px;
font-size:14px;
}
</style>
</head>
<body>
<div id="info">步数：<span id="steps">0</span></div>
<div id="game"></div>
<button id="reset">重新开始</button>

<script>
const gameEl = document.getElementById('game');
const stepsEl = document.getElementById('steps');
const resetBtn = document.getElementById('reset');

// 地图：#墙 @人 $箱子 .目标 *箱子在目标 +人在目标
const level = [
  '#####',
  '#@  #',
  '# $ #',
  '#  .#',
  '#####'
];

let map = [];
let playerX = 0, playerY = 0;
let steps = 0;

function init(){
  map = level.map(row=>[...row]);
  steps = 0;
  stepsEl.textContent = steps;
  // 找玩家位置
  for(let y=0;y<map.length;y++){
    for(let x=0;x<map[y].length;x++){
      if(map[y][x]=='@' || map[y][x]=='+'){
        playerX = x; playerY = y;
      }
    }
  }
  render();
}

function render(){
  gameEl.innerHTML = '';
  gameEl.style.gridTemplateColumns = `repeat(${map[0].length}, 36px)`;
  for(let row of map){
    for(let c of row){
      const div = document.createElement('div');
      div.className = 'cell';
      if(c=='#') div.classList.add('wall');
      else if(c=='.' || c=='+') div.classList.add('target');
      else if(c=='$' || c=='*') div.classList.add('box');
      else if(c=='@' || c=='+') div.classList.add('player');
      else div.classList.add('floor');
      gameEl.appendChild(div);
    }
  }
}

function move(dx, dy){
  const nx = playerX + dx;
  const ny = playerY + dy;
  // 撞墙
  if(map[ny][nx]=='#') return;
  // 推箱子
  if(map[ny][nx]=='$' || map[ny][nx]=='*'){
    const nnx = nx + dx;
    const nny = ny + dy;
    if(map[nny][nnx]=='#' || map[nny][nnx]=='$' || map[nny][nnx]=='*') return;
    // 移动箱子
    map[ny][nx] = map[ny][nx]=='*' ? '.' : ' ';
    map[nny][nnx] = map[nny][nnx]=='.' ? '*' : '$';
  }
  // 移动玩家
  map[playerY][playerX] = map[playerY][playerX]=='+' ? '.' : ' ';
  playerX = nx; playerY = ny;
  map[ny][nx] = map[ny][nx]=='.' ? '+' : '@';
  steps++;
  stepsEl.textContent = steps;
  render();
  checkWin();
}

function checkWin(){
  for(let row of map){
    for(let c of row){
      if(c=='$') return;
    }
  }
  setTimeout(()=>alert(`恭喜通关！\n步数：${steps}`), 100);
}

// 触摸滑动
let startX = 0, startY = 0;
document.addEventListener('touchstart', e=>{
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});
document.addEventListener('touchend', e=>{
  const dx = e.changedTouches[0].clientX - startX;
  const dy = e.changedTouches[0].clientY - startY;
  if(Math.abs(dx) > Math.abs(dy)){
    if(dx>30) move(1,0);
    else if(dx<-30) move(-1,0);
  }else{
    if(dy>30) move(0,1);
    else if(dy<-30) move(0,-1);
  }
});

// 电脑方向键
window.addEventListener('keydown', e=>{
  if(e.key=='ArrowLeft') move(-1,0);
  if(e.key=='ArrowRight') move(1,0);
  if(e.key=='ArrowUp') move(0,-1);
  if(e.key=='ArrowDown') move(0,1);
});

resetBtn.addEventListener('click', init);
init();
</script>
</body>
</html>
